<!DOCTYPE html>
<html>
<head>
    <title>My GitHub Web App</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        h1 { color: #2ecc71; }
    </style>
</head>
<body>
    <h1>ยินดีต้อนรับสู่ Web App บน GitHub</h1>
    <p>นี่คือหน้าที่สร้างจาก GitHub Pages และไม่มีแถบสีเหลือง</p>
    
    <!-- ส่วนที่จะดึงข้อมูลจาก Google Sheets มาโชว์ (ถ้ามี) -->
    <script>
    const URL = "https://script.google.com/macros/s/AKfycbwvsZL1H6fu8DBHA5APRLgEiiP_diqMmTqSYWXT2IlGpsg9hqnpwY7hI7upGBXyjy5o/exec";
    
    fetch(URL)
      .then(response => response.json())
      .then(data => {
        document.getElementById("data-display").innerText = data.message;
      });
</script>
    <div id="data-display">กำลังโหลดข้อมูล...</div>
</body>
</html>
